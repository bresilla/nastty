name: release binaries

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  binaries:
    name: ${{ matrix.artifact }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            artifact: "nastty-linux-amd64"
          - os: ubuntu-24.04-arm
            artifact: "nastty-linux-arm64"
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name }}

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo files
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: release-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            release-${{ runner.os }}-${{ runner.arch }}-

      - name: Build
        run: make build-release

      - name: Smoke test
        run: |
          target/release/nastty --version
          target/release/nastty serve --help
          target/release/nastty tui --help

      - name: Package
        env:
          ARTIFACT: ${{ matrix.artifact }}
        run: |
          mkdir -p dist
          install -m 0755 target/release/nastty "dist/${ARTIFACT}"
          tar -C dist -czf "dist/${ARTIFACT}.tar.gz" "${ARTIFACT}"
          (
            cd dist
            sha256sum "${ARTIFACT}" "${ARTIFACT}.tar.gz" > "${ARTIFACT}.sha256"
          )

      - name: Upload release assets
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: |
            dist/${{ matrix.artifact }}
            dist/${{ matrix.artifact }}.tar.gz
            dist/${{ matrix.artifact }}.sha256
